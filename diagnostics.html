<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firestore Diagnostics</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 2rem; }
        h1 { color: #ff00ff; }
        pre { background: #1e1e1e; padding: 1rem; border-radius: 5px; border: 1px solid #333; overflow-x: auto; }
        .doc-box { border: 1px solid #444; padding: 1rem; margin-bottom: 1rem; border-radius: 5px; background: #1a1a1a; }
        .doc-id { font-weight: bold; color: #00ffff; }
    </style>
</head>
<body>
    <h1>Firestore Collection Diagnostics</h1>
    <div id="status">Initializing Firebase...</div>
    <div id="output"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');

        async function runDiagnostics() {
            try {
                statusEl.textContent = "Fetching documents from 'portfolioWorks'...";
                const snapshot = await db.collection('portfolioWorks').get();
                
                if (snapshot.empty) {
                    statusEl.textContent = "Collection is empty.";
                    return;
                }

                statusEl.textContent = `Found ${snapshot.size} documents in 'portfolioWorks':`;
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'doc-box';
                    div.innerHTML = `
                        <div class="doc-id">Document ID: ${doc.id}</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    outputEl.appendChild(div);
                });
            } catch (e) {
                statusEl.textContent = "Error running diagnostics: " + e.message;
                console.error(e);
            }
        }

        window.onload = runDiagnostics;
    </script>
</body>
</html>
