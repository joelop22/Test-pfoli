<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Joel Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div class="bg-gradient"></div>

    <div style="background: var(--glass-bg); padding: 3rem; border-radius: 10px; border: 1px solid var(--glass-border); width: 100%; max-width: 400px; text-align: center;">
        <h2 style="margin-bottom: 2rem; font-size: 2rem;">Admin Login</h2>
        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <p id="error-msg" style="color: #ff4757; margin-bottom: 1rem; display: none;">Invalid credentials.</p>
            <button type="submit" class="btn" style="width: 100%;">Login</button>
        </form>
        <a href="index.html" style="display: inline-block; margin-top: 1.5rem; color: var(--color-text-muted); text-decoration: none;">&larr; Back to Home</a>
    </div>

    <script src="login.js"></script>
</body>
</html>
